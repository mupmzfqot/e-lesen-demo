<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pindaan Lesen — e-Lesen MPOB</title>
    <script type="module" crossorigin src="/assets/main-HAbphAFF.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/main-CXxVRoza.css">
  </head>
  <body class="min-h-screen bg-gray-50 dark:bg-gray-950">
    <div id="sidebar"></div>

    <div class="lg:pl-64">
      <div id="header"></div>

      <main class="p-4 lg:p-6">
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Pindaan Butiran Lesen</h1>
          <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
            Mohon pindaan terhadap butiran lesen sedia ada
          </p>
        </div>

        <div class="card">
          <h2 class="mb-6 text-lg font-semibold text-gray-900 dark:text-white">Maklumat Pindaan</h2>
          <form class="space-y-6" onsubmit="return false">
            <!-- Pilih Lesen -->
            <div>
              <label class="form-label">Lesen yang Dipinda</label>
              <select class="form-input">
                <option value="">-- Pilih lesen --</option>
                <option>KPB-2024-1234 — Kilang Pemprosesan</option>
                <option>KPB-2024-1235 — Peniaga</option>
                <option>KPB-2024-1236 — Pengeksport</option>
                <option>KPB-2023-0987 — Pengimport</option>
              </select>
            </div>

            <!-- Jenis Pindaan -->
            <div>
              <label class="form-label">Jenis Pindaan</label>
              <div class="space-y-2">
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input
                    type="checkbox"
                    class="rounded border-gray-300 text-primary focus:ring-primary dark:border-gray-600"
                  />
                  Pindaan nama syarikat
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input
                    type="checkbox"
                    class="rounded border-gray-300 text-primary focus:ring-primary dark:border-gray-600"
                  />
                  Pindaan alamat premis
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input
                    type="checkbox"
                    class="rounded border-gray-300 text-primary focus:ring-primary dark:border-gray-600"
                  />
                  Pindaan ahli lembaga pengarah
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input
                    type="checkbox"
                    class="rounded border-gray-300 text-primary focus:ring-primary dark:border-gray-600"
                  />
                  Tambahan aktiviti
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input
                    type="checkbox"
                    class="rounded border-gray-300 text-primary focus:ring-primary dark:border-gray-600"
                  />
                  Pengurangan aktiviti
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input
                    type="checkbox"
                    class="rounded border-gray-300 text-primary focus:ring-primary dark:border-gray-600"
                  />
                  Tambahan daya pemprosesan
                </label>
              </div>
            </div>

            <!-- Butiran Semasa vs Baharu -->
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
              <div>
                <label class="form-label">Butiran Semasa</label>
                <textarea class="form-input bg-gray-50 dark:bg-gray-800" rows="4" readonly>
Sawit Jaya Sdn Bhd
No. 12, Jalan Industri 3,
Kawasan Perindustrian Gebeng,
26080 Kuantan, Pahang</textarea
                >
              </div>
              <div>
                <label class="form-label">Butiran Baharu (Dipinda)</label>
                <textarea
                  class="form-input"
                  rows="4"
                  placeholder="Masukkan butiran baharu..."
                ></textarea>
              </div>
            </div>

            <!-- Sebab Pindaan -->
            <div>
              <label class="form-label">Sebab Pindaan</label>
              <textarea
                class="form-input"
                rows="3"
                placeholder="Nyatakan sebab pindaan diperlukan..."
              ></textarea>
            </div>

            <!-- Dokumen -->
            <div>
              <label class="form-label">Dokumen Sokongan</label>
              <div
                class="flex items-center justify-center rounded-lg border-2 border-dashed border-gray-300 px-6 py-8 dark:border-gray-600"
              >
                <div class="text-center">
                  <i data-lucide="upload" class="mx-auto mb-2 h-8 w-8 text-gray-400"></i>
                  <p class="text-sm text-gray-600 dark:text-gray-400">
                    Seret dan lepas fail di sini, atau
                    <button
                      type="button"
                      class="font-medium text-primary hover:text-primary-light dark:text-accent-light"
                    >
                      pilih fail
                    </button>
                  </p>
                  <p class="mt-1 text-xs text-gray-400">PDF, JPG, PNG (maks. 10MB setiap fail)</p>
                </div>
              </div>
            </div>

            <div
              class="flex items-center justify-end gap-3 border-t border-gray-200 pt-6 dark:border-gray-700"
            >
              <a href="/pemohon/dashboard.html" class="btn-secondary">Batal</a>
              <button type="submit" class="btn-primary">
                <i data-lucide="send" class="h-4 w-4"></i>
                Hantar Permohonan Pindaan
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

  </body>
</html>
