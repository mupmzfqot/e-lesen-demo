<header class="sticky top-0 z-20 flex h-16 items-center justify-between border-b border-gray-200 bg-white px-4 lg:px-6 dark:border-gray-700 dark:bg-gray-900">
  <!-- Left: hamburger + breadcrumb -->
  <div class="flex items-center gap-3">
    <button id="sidebar-toggle" type="button" class="rounded-lg p-2 text-gray-500 hover:bg-gray-100 lg:hidden dark:text-gray-400 dark:hover:bg-gray-800">
      <i data-lucide="menu" class="h-5 w-5"></i>
    </button>
    <nav class="hidden items-center gap-1 text-sm text-gray-500 sm:flex dark:text-gray-400">
      <a href="/admin/dashboard.html" class="hover:text-gray-700 dark:hover:text-gray-200">Utama</a>
      <i data-lucide="chevron-right" class="h-3 w-3"></i>
      <span class="font-medium text-gray-900 dark:text-white" id="breadcrumb-current">Dashboard</span>
    </nav>
  </div>

  <!-- Right: actions -->
  <div class="flex items-center gap-2">
    <!-- Dark mode toggle -->
    <button id="dark-mode-toggle" type="button" class="rounded-lg p-2 text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800" title="Tukar Mod Gelap/Cerah">
      <i data-lucide="moon" class="h-5 w-5 dark:hidden"></i>
      <i data-lucide="sun" class="hidden h-5 w-5 dark:block"></i>
    </button>

    <!-- Notifications -->
    <button type="button" class="relative rounded-lg p-2 text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800" title="Notifikasi">
      <i data-lucide="bell" class="h-5 w-5"></i>
      <span class="absolute right-1 top-1 h-2 w-2 rounded-full bg-danger"></span>
    </button>

    <!-- Language -->
    <button type="button" class="rounded-lg px-2 py-1 text-xs font-medium text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800" title="Tukar Bahasa">
      BM
    </button>
  </div>
</header>
